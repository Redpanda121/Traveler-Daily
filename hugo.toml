baseURL = "http://127.0.0.1:1313/"
locale = "zh-CN"
title = "旅者手札"
theme = "PaperMod"

[caches]
  [caches.images]
    dir = ":cacheDir/images"

[params]
  defaultTheme = "auto"
  mainSections = ["posts"]
  ShowReadingTime = true
  ShowToc = true
  ShowBreadCrumbs = true
  ShowPostNavLinks = true

  [params.journeyHero]
    eyebrow = "Wanderer's Journal"
    title = "旅者手札"
    subtitle = "把沿途的风、短暂的停留，以及一点点成长，写进不会遗失的旅途。"
    button = "翻开手札"

[menu]
  [[menu.main]]
    identifier = "posts"
    name = "冒险日志"
    url = "/posts/"
    weight = 10

  [[menu.main]]
    identifier = "guides"
    name = "操作指南"
    url = "/guides/"
    weight = 15

  [[menu.main]]
    identifier = "tags"
    name = "标签"
    url = "/tags/"
    weight = 20

  [[menu.main]]
    identifier = "archives"
    name = "归档"
    url = "/archives/"
    weight = 30

  [[menu.main]]
    identifier = "about"
    name = "关于我"
    url = "/about/"
    weight = 40

  [[menu.main]]
    identifier = "write"
    name = "+"
    url = "write/"
    title = "写文章"
    weight = 5
