{{- define "main" }}
{{- $hero := site.Params.journeyHero }}

<section class="journey-hero" style="--journey-hero: url('{{ "images/journey-hero-final.webp" | relURL }}')">
  <div class="journey-hero__shade"></div>
  <div class="journey-hero__content">
    <p class="journey-kicker">{{ $hero.eyebrow | default "Wanderer's Journal" }}</p>
    <p class="journey-hero__subtitle">
      {{ $hero.subtitle | default "记录日常，也记录一路成为自己的过程。" }}
    </p>
    <a class="journey-hero__button" href="{{ "journal/" | relURL }}">
      {{ $hero.button | default "翻开手札" }}
      <span aria-hidden="true">→</span>
    </a>
  </div>
  <p class="journey-hero__note">下一站，也许就在一页之后</p>
</section>
{{- end }}
